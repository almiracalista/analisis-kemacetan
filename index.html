<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoring Lalu Lintas Indonesia</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#0077cc;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    display:flex;
    height:calc(100vh - 70px);
}

.sidebar{
    width:350px;
    background:white;
    padding:20px;
    overflow-y:auto;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card{
    background:#f8f9fa;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

.card h3{
    margin-bottom:10px;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:5px;
    background:#0077cc;
    color:white;
    cursor:pointer;
    margin-bottom:10px;
}

button:hover{
    background:#005fa3;
}

#map{
    flex:1;
}

.status{
    font-size:22px;
    font-weight:bold;
    text-align:center;
}

.info p{
    margin:5px 0;
}

</style>

</head>
<body>

<header>
    <h1>🚦 Monitoring Lalu Lintas Indonesia</h1>
</header>

<div class="container">

<div class="sidebar">

<div class="card">

<h3>Cari Lokasi</h3>

<input
type="text"
id="lokasi"
placeholder="Contoh: Jakarta, Bandung, Yogyakarta">

<button onclick="cariLokasi()">
🔍 Cari Lokasi
</button>

<button onclick="lokasiSaya()">
📍 Lokasi Saya
</button>

</div>

<div class="card">

<h3>Status Lalu Lintas</h3>

<div
id="status"
class="status">
Menunggu...
</div>

</div>

<div class="card">

<h3>Informasi Lokasi</h3>

<div class="info">

<p><b>Latitude:</b></p>
<p id="lat">-</p>

<p><b>Longitude:</b></p>
<p id="lng">-</p>

</div>

</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map =
L.map('map').setView(
[-2.5489,118.0149],
5
);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
}
).addTo(map);

var marker;

function tampilkanMarker(lat,lng,nama){

    if(marker){
        map.removeLayer(marker);
    }

    marker =
    L.marker([lat,lng])
    .addTo(map)
    .bindPopup(nama)
    .openPopup();

    map.setView([lat,lng],13);

    document.getElementById("lat").innerHTML =
    lat.toFixed(6);

    document.getElementById("lng").innerHTML =
    lng.toFixed(6);

    var kondisi = [
        "🟢 LANCAR",
        "🟠 PADAT",
        "🔴 MACET"
    ];

    document.getElementById("status").innerHTML =
    kondisi[Math.floor(Math.random()*3)];
}

async function cariLokasi(){

    var nama =
    document.getElementById("lokasi").value;

    if(nama==""){
        alert("Masukkan nama lokasi");
        return;
    }

    try{

        const response =
        await fetch(
        "https://nominatim.openstreetmap.org/search?format=json&q="
        + encodeURIComponent(nama)
        );

        const data =
        await response.json();

        if(data.length===0){

            alert("Lokasi tidak ditemukan");
            return;

        }

        const lat =
        parseFloat(data[0].lat);

        const lon =
        parseFloat(data[0].lon);

        tampilkanMarker(
        lat,
        lon,
        nama
        );

    }
    catch(err){

        alert(
        "Terjadi kesalahan saat mencari lokasi"
        );

    }

}

function lokasiSaya(){

    if(!navigator.geolocation){

        alert(
        "GPS tidak didukung browser"
        );

        return;

    }

    navigator.geolocation.getCurrentPosition(

    function(pos){

        tampilkanMarker(
        pos.coords.latitude,
        pos.coords.longitude,
        "Lokasi Saya"
        );

    },

    function(){

        alert(
        "Izinkan akses lokasi terlebih dahulu"
        );

    }

    );

}

</script>

</body>
</html>
