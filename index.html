<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoring Kemacetan Indonesia</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    display:flex;
    flex-wrap:wrap;
}

.sidebar{
    width:320px;
    background:white;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card{
    background:#f8f9fa;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

.card h3{
    margin-bottom:10px;
}

.status{
    font-size:24px;
    font-weight:bold;
    color:red;
}

#map{
    flex:1;
    height:90vh;
}

.info{
    margin-top:10px;
    line-height:1.8;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    background:#0d6efd;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.btn:hover{
    background:#0b5ed7;
}

</style>
</head>

<body>

<header>
    <h1>🚦 Monitoring Kemacetan Indonesia</h1>
    <p>Google Maps Traffic Layer Realtime</p>
</header>

<div class="container">

<div class="sidebar">

<div class="card">
<h3>Status Sistem</h3>

<p>Status:</p>
<div class="status">AKTIF</div>

</div>

<div class="card">

<h3>Lokasi Pengguna</h3>

<div class="info">

<p><b>Latitude:</b></p>
<p id="lat">-</p>

<p><b>Longitude:</b></p>
<p id="lng">-</p>

</div>

</div>

<div class="card">

<h3>Informasi Lalu Lintas</h3>

<p>
Warna pada peta:
</p>

<br>

<p>🟢 Lancar</p>
<p>🟠 Padat</p>
<p>🔴 Macet</p>
<p>🔴🔴 Sangat Macet</p>

</div>

<button class="btn" onclick="cariLokasi()">
📍 Deteksi Lokasi Saya
</button>

</div>

<div id="map"></div>

</div>

<script>

let map;
let marker;

function initMap(){

    map = new google.maps.Map(
        document.getElementById("map"),
        {
            zoom:5,
            center:{
                lat:-2.5,
                lng:118
            }
        }
    );

    const trafficLayer =
        new google.maps.TrafficLayer();

    trafficLayer.setMap(map);
}

function cariLokasi(){

    if(navigator.geolocation){

        navigator.geolocation.getCurrentPosition(

        function(position){

            const lat =
                position.coords.latitude;

            const lng =
                position.coords.longitude;

            document.getElementById("lat")
            .innerHTML =
            lat.toFixed(6);

            document.getElementById("lng")
            .innerHTML =
            lng.toFixed(6);

            const posisi = {
                lat:lat,
                lng:lng
            };

            map.setCenter(posisi);

            map.setZoom(15);

            if(marker){
                marker.setMap(null);
            }

            marker =
            new google.maps.Marker({
                position:posisi,
                map:map,
                title:"Lokasi Anda"
            });

        },

        function(){
            alert(
            "Lokasi tidak dapat diakses");
        });

    }
}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=API_KEY_KAMU&callback=initMap">
</script>

</body>
</html>
