<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoring Kemacetan</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
}

header{
    background:#0077cc;
    color:white;
    text-align:center;
    padding:15px;
}

#map{
    height:70vh;
}

.panel{
    padding:20px;
    background:#f4f4f4;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:8px;
    box-shadow:0 0 5px rgba(0,0,0,0.1);
}

button{
    width:100%;
    padding:12px;
    background:#0077cc;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

#status{
    font-size:24px;
    font-weight:bold;
}
</style>
</head>
<body>

<header>
    <h1>🚦 Monitoring Kemacetan Indonesia</h1>
</header>

<div id="map"></div>

<div class="panel">

    <div class="card">
        <h3>Status Lalu Lintas</h3>
        <div id="status">Belum Dimulai</div>
    </div>

    <div class="card">
        <p><b>Latitude:</b> <span id="lat">-</span></p>
        <p><b>Longitude:</b> <span id="lng">-</span></p>
        <p><b>Kecepatan:</b> <span id="speed">-</span></p>
    </div>

    <button onclick="mulaiTracking()">
        Mulai Monitoring
    </button>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-2.5,118],5);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19
}
).addTo(map);

var marker;

function mulaiTracking(){

    if(!navigator.geolocation){
        alert("GPS tidak didukung browser.");
        return;
    }

    navigator.geolocation.watchPosition(

        function(pos){

            var lat = pos.coords.latitude;
            var lng = pos.coords.longitude;

            document.getElementById("lat").innerHTML =
            lat.toFixed(6);

            document.getElementById("lng").innerHTML =
            lng.toFixed(6);

            var speed = pos.coords.speed;

            if(speed == null){
                speed = 0;
            }

            speed = speed * 3.6;

            document.getElementById("speed").innerHTML =
            speed.toFixed(1) + " km/jam";

            var status = "";

            if(speed < 20){
                status = "🔴 MACET";
            }
            else if(speed < 40){
                status = "🟠 PADAT";
            }
            else{
                status = "🟢 LANCAR";
            }

            document.getElementById("status").innerHTML =
            status;

            map.setView([lat,lng],15);

            if(marker){
                map.removeLayer(marker);
            }

            marker = L.marker([lat,lng]).addTo(map);

        },

        function(err){
            alert(
            "Izinkan akses lokasi pada browser."
            );
        },

        {
            enableHighAccuracy:true
        }

    );

}

</script>

</body>
</html>
